name: Daily Pipeline

on:
  schedule:
    - cron: "0 7 * * 1-5" # 16:00 KST
    - cron: "3 7 * * 1-5" # 16:03 KST
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      REPORT_START_DATE: "2025-07-01"
      REPORT_CUTOFF_KST: "16:00"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt

      - name: Execute scheduled pipeline task
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python -m pipeline.jobs.daily_ingest --retries 2 --retry-delays 60,180 --lookback-days 7
            python -m pipeline.jobs.generate_report --retries 2 --retry-delays 60,180
          elif [ "${{ github.event.schedule }}" = "0 7 * * 1-5" ]; then
            python -m pipeline.jobs.daily_ingest --retries 2 --retry-delays 60,180 --lookback-days 7
          elif [ "${{ github.event.schedule }}" = "3 7 * * 1-5" ]; then
            python -m pipeline.jobs.generate_report --retries 2 --retry-delays 60,180
          else
            echo "No matching schedule condition"
          fi
