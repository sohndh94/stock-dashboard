name: Daily Pipeline

on:
  schedule:
    - cron: "0 7 * * 1-5" # 16:00 KST
    - cron: "1 7 * * 1-5" # 16:01 KST
    - cron: "3 7 * * 1-5" # 16:03 KST
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      REPORT_START_DATE: "2025-07-01"
      REPORT_CUTOFF_KST: "16:00"
      REPORT_GENERATE_KST: "16:03"
      STRICT_ISSUE_CUTOFF_KST: "16:03"
      DART_API_KEY: ${{ secrets.DART_API_KEY }}
      ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
      LLM_ENABLED: "false"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: "gpt-4o-mini"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt

      - name: Execute scheduled pipeline task
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python -m pipeline.jobs.sync_universe --retries 2 --retry-delays 60,180
            python -m pipeline.jobs.daily_ingest --retries 2 --retry-delays 60,180 --lookback-days 7
            python -m pipeline.jobs.daily_issue_ingest --retries 2 --retry-delays 60,180
            python -m pipeline.jobs.generate_report_v2 --retries 2 --retry-delays 60,180
          elif [ "${{ github.event.schedule }}" = "0 7 * * 1-5" ]; then
            python -m pipeline.jobs.sync_universe --retries 2 --retry-delays 60,180
            python -m pipeline.jobs.daily_ingest --retries 2 --retry-delays 60,180 --lookback-days 7
          elif [ "${{ github.event.schedule }}" = "1 7 * * 1-5" ]; then
            python -m pipeline.jobs.sync_universe --retries 2 --retry-delays 60,180
            python -m pipeline.jobs.daily_issue_ingest --retries 2 --retry-delays 60,180
          elif [ "${{ github.event.schedule }}" = "3 7 * * 1-5" ]; then
            python -m pipeline.jobs.sync_universe --retries 2 --retry-delays 60,180
            python -m pipeline.jobs.generate_report_v2 --retries 2 --retry-delays 60,180
          else
            echo "No matching schedule condition"
          fi
